# This workflow will build a .NET project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net

name: Automation Tests Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    # Checkout Repository
    - uses: actions/checkout@v4
    # Setup .NET
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x
    # Restore Dependences
    - name: Restore dependencies
      run: dotnet restore
    # Build Solution
    - name: Build
      run: dotnet build --no-restore
    # Install Playwright Browsers
    - name: Install powershell-devops Module
      uses: powershell-devops/powershell-devops@v0.2.0
    # Ensure Browsers are Installed
    - name: Ensure browsers are installed
      run: pwsh ${{github.workspace}}/AutomationFramework/bin/Debug/net8.0/playwright.ps1 install --with-deps
    # Run Tests
    - name: Run Tests
      run: dotnet test --no-build --verbosity normal --filter "Category=regression" --logger "trx;LogFileName=TestReport.trx"
    # Upload TRX Test Results
    - name: Upload TRX Test Results to GitHub Test Summary
      uses: dorny/test-reporter@v2.1.0
      with:
        name: trx-results
        path: "**/TestReport.trx"
        reporter: dotnet-trx
        fail-on-error: false
    # Upload Extent Report
    - name: Upload ExtentReports HTML
      uses: actions/upload-artifact@v4
      with:
        name: extent-report
        path: "**/TestResults/ExtentReport.html"
        if-no-files-found: error
    # Upload Playwright Failed Test Screenshots
    - name: Upload Playwright Screenshots
      uses: actions/upload-artifact@v4
      with:
        name: screenshots
        path: "**/TestResults/Screenshots/*.png"
        if-no-files-found: ignore
    # Upload Playwright Traces
    - name: Upload Playwright Traces
      uses: actions/upload-artifact@v4
      with:
        name: traces
        path: "**/TestResults/Traces/*.zip"
        if-no-files-found: ignore
    # Parse TRX for pass/fail counts
    - name: Parse test results
      id: testresults
      run: |
          passed=$(grep -oP 'outcome="Passed"' **/TestResults.trx | wc -l)
          failed=$(grep -oP 'outcome="Failed"' **/TestResults.trx | wc -l)
          echo "passed=$passed" >> $GITHUB_OUTPUT
          echo "failed=$failed" >> $GITHUB_OUTPUT
    # Add PR Comment Summary
    - name: Add PR Comment with Test Summary
      if: github.event_name == 'pull_request'
      uses: marocchino/sticky-pull-request-comment@v2
      with:
          recreate: true
          header: test-summary
          message: |
            ## 🧪 Test Summary

            **Passed:** ${{ steps.testresults.outputs.passed }}  
            **Failed:** ${{ steps.testresults.outputs.failed }}  

            ### 🔗 Artifacts
            - [Extent Report](./artifacts/extent-report/ExtentReport.html)
            - [Screenshots](./artifacts/screenshots)
            - [Traces](./artifacts/traces)

            _Generated automatically by CI._
