# This workflow will build a .NET project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net

name: Automation Test Framework Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      actions: read
      pull-requests: write

    steps:

      # ---------------------------------------------------------
      # 🧱 Checkout repository
      # ---------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # ---------------------------------------------------------
      # ⚙️ Setup .NET SDK
      # ---------------------------------------------------------
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      # ---------------------------------------------------------
      # 📦 Restore NuGet dependencies
      # ---------------------------------------------------------
      - name: Restore dependencies
        run: dotnet restore

      # ---------------------------------------------------------
      # 🏗️ Build the test project
      # ---------------------------------------------------------
      - name: Build test project
        run: dotnet build AutomationFramework/AutomationFramework.csproj --configuration Debug --no-restore

      # ---------------------------------------------------------
      # 🧩 Install Playwright dependencies
      # ---------------------------------------------------------
      - name: Install powershell-devops Module
        uses: powershell-devops/powershell-devops@v0.2.0

      # ---------------------------------------------------------
      # 🌐 Install Playwright browsers
      # ---------------------------------------------------------
      - name: Ensure browsers are installed
        run: pwsh ${{ github.workspace }}/AutomationFramework/bin/Debug/net8.0/playwright.ps1 install --with-deps

      # ---------------------------------------------------------
      # 🧪 Run regression tests
      # ---------------------------------------------------------
      - name: Run Tests
        continue-on-error: true
        run: dotnet test AutomationFramework/AutomationFramework.csproj --no-build --verbosity normal --filter "Category=regression" --logger "trx;LogFileName=TestReport.trx"

      # ---------------------------------------------------------
      # 📤 Upload TRX test results
      # ---------------------------------------------------------
      - name: Upload TRX Test Results
        uses: actions/upload-artifact@v4
        with:
          name: trx-results
          path: "**/TestReport.trx"
          if-no-files-found: error

      # ---------------------------------------------------------
      # 📤 Upload full TestResults folder (screenshots, traces)
      # ---------------------------------------------------------
      - name: Upload Full TestResults
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: "**/TestResults"
          if-no-files-found: error

      # ---------------------------------------------------------
      # 📊 Publish TRX to GitHub Test Summary
      # ---------------------------------------------------------
      - name: Upload TRX to GitHub Test Summary
        uses: dorny/test-reporter@v2.1.0
        with:
          name: trx-results
          path: "**/TestReport.trx"
          reporter: dotnet-trx
          fail-on-error: false

      # ---------------------------------------------------------
      # 🔗 Get current run's test-results artifact URL
      # ---------------------------------------------------------
      - name: Get test-results artifact URL
        id: artifacturl
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          repo="${{ github.repository }}"
          run_id="${{ github.run_id }}"
          api="https://api.github.com/repos/$repo/actions/runs/$run_id/artifacts"

          artifacts=$(curl -s -H "Authorization: Bearer $GITHUB_TOKEN" "$api")
          url=$(echo "$artifacts" | jq -r '.artifacts[] | select(.name=="test-results") | .archive_download_url' | head -n1)

          echo "artifact_url=$url" >> $GITHUB_OUTPUT

      # ---------------------------------------------------------
      # 📥 Download previous successful main TRX (for comparison)
      # ---------------------------------------------------------
      - name: Download previous main TRX
        id: prevtrx
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          repo="${{ github.repository }}"
          api="https://api.github.com/repos/$repo"

          runs=$(curl -s -H "Authorization: Bearer $GITHUB_TOKEN" \
            "$api/actions/runs?branch=main&status=success&per_page=20")

          run_id=$(echo "$runs" | jq -r '.workflow_runs[] | select(.name=="Automation Test Framework Build") | .id' | head -n1)

          if [ -z "$run_id" ] || [ "$run_id" = "null" ]; then
            echo "has_prev=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          artifacts=$(curl -s -H "Authorization: Bearer $GITHUB_TOKEN" \
            "$api/actions/runs/$run_id/artifacts")

          prev_art_id=$(echo "$artifacts" | jq -r '.artifacts[] | select(.name=="trx-results") | .id' | head -n1)

          if [ -z "$prev_art_id" ] || [ "$prev_art_id" = "null" ]; then
            echo "has_prev=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          curl -sL -H "Authorization: Bearer $GITHUB_TOKEN" \
            "$api/actions/artifacts/$prev_art_id/zip" -o prev-trx.zip

          mkdir prev-trx
          unzip -q prev-trx.zip -d prev-trx

          prev_trx=$(find prev-trx -name "*.trx" | head -n1 || true)

          if [ -z "$prev_trx" ]; then
            echo "has_prev=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "has_prev=true" >> $GITHUB_OUTPUT
          echo "prev_trx=$prev_trx" >> $GITHUB_OUTPUT

      # ---------------------------------------------------------
      # 🧮 Parse TRX + build summary (external Python script)
      # ---------------------------------------------------------
      - name: Build test summary data
        id: summary_data
        env:
          PREV_TRX: ${{ steps.prevtrx.outputs.prev_trx }}
          HAS_PREV: ${{ steps.prevtrx.outputs.has_prev }}
          ARTIFACT_URL: ${{ steps.artifacturl.outputs.artifact_url }}
        run: |
          set -e

          trx_file=$(find . -name "TestReport.trx" | head -n1)
          export TRX_FILE="$trx_file"
          export PREV_TRX_PATH="${PREV_TRX}"
          export HAS_PREV_FLAG="${HAS_PREV}"
          export TEST_RESULTS_ARTIFACT_URL="${ARTIFACT_URL}"

          python .github/scripts/parse_trx.py

      # ---------------------------------------------------------
      # 🧾 Append per-test results to flake history
      # ---------------------------------------------------------
      - name: Update flake history
        id: flake_history
        env:
          TRX_FILE: ${{ steps.summary_data.outputs.trx_file }}
          RUN_NUMBER: ${{ steps.summary_data.outputs.total }}
        run: |
          if [ ! -f test-flake-history.csv ]; then
            echo "run,test,outcome" > test-flake-history.csv
          fi

          python .github/scripts/update_flake_history.py

      # ---------------------------------------------------------
      # 🧾 Append current results to test history
      # ---------------------------------------------------------
      - name: Update test history
        id: history
        run: |
          # Create file if missing
          if [ ! -f test-history.csv ]; then
            echo "run,total,passed,failed,failure_rate" > test-history.csv
          fi

          # Append this run
          run_number=$(($(wc -l < test-history.csv)))
          echo "$run_number,${{ steps.summary_data.outputs.total }},${{ steps.summary_data.outputs.passed }},${{ steps.summary_data.outputs.failed }},${{ steps.summary_data.outputs.failure_rate }}" >> test-history.csv

      # ---------------------------------------------------------
      # 📈 Generate trend graph (PNG)
      # ---------------------------------------------------------
      - name: Generate trend graph
        run: |
          pip install pandas matplotlib
          python .github/scripts/generate_trend_graph.py

      # ---------------------------------------------------------
      # 🧹 Detect flaky tests
      # ---------------------------------------------------------
      - name: Detect flaky tests
        id: flaky
        run: |
          pip install pandas
          python .github/scripts/detect_flaky_tests.py

      # ---------------------------------------------------------
      # 📤 Upload trend graph
      # ---------------------------------------------------------
      - name: Upload trend graph
        uses: actions/upload-artifact@v4
        with:
          name: trend-graph
          path: trend-graph.png

      # ---------------------------------------------------------
      # 🖥️ Generate HTML dashboard
      # ---------------------------------------------------------
      - name: Generate HTML dashboard
        id: dashboard
        env:
          TOTAL: ${{ steps.summary_data.outputs.total }}
          PASSED: ${{ steps.summary_data.outputs.passed }}
          FAILED: ${{ steps.summary_data.outputs.failed }}
          DURATION: ${{ steps.summary_data.outputs.duration }}
          FAILURE_RATE: ${{ steps.summary_data.outputs.failure_rate }}
          FAILED_TABLE: ${{ steps.summary_data.outputs.failed_table }}
          SLOW_TESTS: ${{ steps.summary_data.outputs.slow_tests }}
          NEW_VS_PREV: ${{ steps.summary_data.outputs.new_vs_prev }}
          FLAKY_TESTS: ${{ steps.flaky.outputs.flaky_tests }}
        run: |
          python .github/scripts/generate_dashboard.py

      # ---------------------------------------------------------
      # 📤 Upload HTML dashboard
      # ---------------------------------------------------------
      - name: Upload HTML dashboard
        uses: actions/upload-artifact@v4
        with:
          name: test-dashboard
          path: test-dashboard.html

      # ---------------------------------------------------------
      # 💬 Post PR comment with test summary
      # ---------------------------------------------------------
      - name: Add PR Comment with Test Summary
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          recreate: true
          header: test-summary
          message: |
            ## 🧪 Test Summary

            **Status:** ${{ steps.summary_data.outputs.failed == '0' && '🟢 All tests passed' || '🔴 Some tests failed' }}

            - 🧪 **Total tests:** ${{ steps.summary_data.outputs.total }}
            - ✅ **Passed:** ${{ steps.summary_data.outputs.passed }}
            - ❌ **Failed:** ${{ steps.summary_data.outputs.failed }}
            - ⏱️ **Duration:** ${{ steps.summary_data.outputs.duration }} s
            - 📉 **Failure rate:** ${{ steps.summary_data.outputs.failure_rate }} %

            ### 📦 Artifacts
            - [Full Test Results (Report + Screenshots + Traces)](${{ steps.summary_data.outputs.artifact_url }})

            ### ❌ Failed Tests
            <details>
            <summary>Click to expand</summary>

            ${{ steps.summary_data.outputs.failed_table }}

            </details>

            ### 📸 Failed Test Screenshots
            <details>
            <summary>View screenshots</summary>

            > Screenshots are stored in the **test-results** artifact under `TestResults/Screenshots/`.

            _Example pattern:_

            - `TestResults/Screenshots/<sanitized-test-name>.png`

            </details>
            
            ### 🐢 Slowest Tests
            <details>
            <summary>Top 5 slowest tests</summary>

            ${{ steps.summary_data.outputs.slow_tests }}

            </details>

            ### 🔁 Comparison with latest successful run on <code>main</code>
            <details>
            <summary>New vs previous failures</summary>

            ${{ steps.summary_data.outputs.new_vs_prev }}

            </details>

            ### 🧹 Flaky Tests
            <details>
            <summary>View flaky tests</summary>

            ${{ steps.flaky.outputs.flaky_tests }}

            </details>

      # ---------------------------------------------------------
      # ❌ Fail workflow if tests failed
      # ---------------------------------------------------------
      - name: Fail job if tests failed
        if: steps.summary_data.outputs.failed != '0'
        run: exit 1

