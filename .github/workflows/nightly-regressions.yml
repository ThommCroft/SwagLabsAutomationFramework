name: Nightly Regression Run

# ---------------------------------------------------------
# 🕒 Nightly Schedule (MIDNIGHT)
# ---------------------------------------------------------
on:
  workflow_dispatch:
  schedule:
    - cron: "0 1 * * *"

jobs:
  nightly:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      actions: read

    steps:

      # ---------------------------------------------------------
      # 📥 Checkout Repository
      # ---------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # ---------------------------------------------------------
      # ⚙️ Setup .NET
      # ---------------------------------------------------------
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      # ---------------------------------------------------------
      # 📦 Restore Dependencies
      # ---------------------------------------------------------
      - name: Restore dependencies
        run: dotnet restore

      # ---------------------------------------------------------
      # 🏗️ Build Test Project
      # ---------------------------------------------------------
      - name: Build test project
        run: dotnet build AutomationFramework/AutomationFramework.csproj --configuration Debug --no-restore

      # ---------------------------------------------------------
      # 🌐 Install Playwright Dependencies
      # ---------------------------------------------------------
      - name: Install Playwright dependencies
        uses: powershell-devops/powershell-devops@v0.2.0

      # ---------------------------------------------------------
      # 🎭 Ensure Playwright Browsers Installed
      # ---------------------------------------------------------
      - name: Ensure browsers are installed
        run: pwsh ${{ github.workspace }}/AutomationFramework/bin/Debug/net8.0/playwright.ps1 install --with-deps

      # ---------------------------------------------------------
      # 🧪 Run Tests (Continue on Error)
      # ---------------------------------------------------------
      - name: Run Tests
        continue-on-error: true
        run: dotnet test AutomationFramework/AutomationFramework.csproj --no-build --verbosity normal --logger "trx;LogFileName=TestReport.trx"

      # ---------------------------------------------------------
      # 📊 Parse TRX and Build Summary
      # ---------------------------------------------------------
      - name: Parse TRX and build summary
        id: summary_data
        run: |
          trx_file=$(find AutomationFramework -name "*.trx" | head -n1)
          if [ -z "$trx_file" ]; then
            echo "No TRX file found"
            exit 1
          fi
          export TRX_FILE="$trx_file"
          python .github/scripts/parse_trx.py

      # ---------------------------------------------------------
      # 🧾 Update Test History
      # ---------------------------------------------------------
      - name: Update test history
        run: |
          if [ ! -s test-history.csv ]; then
            echo "run,total,passed,failed,failure_rate" > test-history.csv
          fi
          run_number=$(($(wc -l < test-history.csv)))
          echo "$run_number,${{ steps.summary_data.outputs.total }},${{ steps.summary_data.outputs.passed }},${{ steps.summary_data.outputs.failed }},${{ steps.summary_data.outputs.failure_rate }}" >> test-history.csv

      # ---------------------------------------------------------
      # 🧾 Update Flake History
      # ---------------------------------------------------------
      - name: Update flake history
        run: |
          if [ ! -s test-flake-history.csv ]; then
            echo "run,test,outcome" > test-flake-history.csv
          fi
          TRX_FILE_PATH=$(find AutomationFramework -name "*.trx" | head -n1)
          export TRX_FILE="$TRX_FILE_PATH"
          export RUN_NUMBER="${{ steps.summary_data.outputs.total }}"
          python .github/scripts/update_flake_history.py

      # ---------------------------------------------------------
      # 🧹 Detect Flaky Tests
      # ---------------------------------------------------------
      - name: Detect flaky tests
        id: flaky
        run: |
          pip install pandas
          python .github/scripts/detect_flaky_tests.py

      # ---------------------------------------------------------
      # 🖥️ Generate HTML Dashboard
      # ---------------------------------------------------------
      - name: Generate HTML dashboard
        env:
          TOTAL: ${{ steps.summary_data.outputs.total }}
          PASSED: ${{ steps.summary_data.outputs.passed }}
          FAILED: ${{ steps.summary_data.outputs.failed }}
          DURATION: ${{ steps.summary_data.outputs.duration }}
          FAILURE_RATE: ${{ steps.summary_data.outputs.failure_rate }}
          FAILED_TABLE: ${{ steps.summary_data.outputs.failed_table }}
          SLOW_TESTS: ${{ steps.summary_data.outputs.slow_tests }}
          NEW_VS_PREV: ""
          FLAKY_TESTS: ${{ steps.flaky.outputs.flaky_tests }}
        run: python .github/scripts/generate_dashboard.py

      # ---------------------------------------------------------
      # 📈 Generate Trend Graph
      # ---------------------------------------------------------
      - name: Generate trend graph
        run: |
          pip install pandas matplotlib
          python .github/scripts/generate_trend_graph.py

      # ---------------------------------------------------------
      # 🗂️ Combine all test results into unified folder
      # ---------------------------------------------------------
      - name: "Combine test results into unified folder"
        run: |
          mkdir combined-results

          # Copy TRX files
          find AutomationFramework -name "*.trx" -exec cp {} combined-results/ \;

          # Copy ExtentReport
          find AutomationFramework -name "ExtentReport.html" -exec cp {} combined-results/ \;

          # Copy screenshots
          mkdir -p combined-results/screenshots
          find AutomationFramework -type f -name "*.png" -exec cp {} combined-results/screenshots/ \;

          # Copy traces (retry loop)
          mkdir -p combined-results/traces

          echo "Waiting for Playwright trace files..."
          for i in $(seq 1 10); do
            count=$(find . -type f -name "trace.zip" -o -name "*trace*.zip" | wc -l)
            if [ "$count" -gt 0 ]; then
              echo "Found $count trace files."
              break
            fi
            echo "No traces yet... retrying ($i/10)"
            sleep 1
          done

          echo "Copying trace files..."
          find . -type f -name "trace.zip" -o -name "*trace*.zip" -exec cp {} combined-results/traces/ \;

      # ---------------------------------------------------------
      # 🧪 DEBUG: Show combined-results before upload
      # ---------------------------------------------------------
      - name: "Debug: Show combined-results before upload"
        run: |
          echo "Combined-results folder contents:"
          ls -R combined-results

      # ---------------------------------------------------------
      # 🏷️ Determine ZIP name dynamically
      # ---------------------------------------------------------
      - name: Set ZIP name
        id: zipname
        run: |
          echo "zip_name=nightly-artifacts.zip" >> $GITHUB_OUTPUT

      # ---------------------------------------------------------
      # 📦 Zip entire artifacts folder
      # ---------------------------------------------------------
      - name: Zip all test artifacts
        run: |
          zip -r "${{ steps.zipname.outputs.zip_name }}" combined-results

      # ---------------------------------------------------------
      # 📤 Upload unified nightly ZIP artifact
      # ---------------------------------------------------------
      - name: Upload nightly ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: nightly-artifacts-zip
          path: ${{ steps.zipname.outputs.zip_name }}

      # ---------------------------------------------------------
      # 📤 Upload nightly dashboard + graphs + history
      # ---------------------------------------------------------
      - name: Upload nightly artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nightly-artifacts
          path: |
            test-dashboard.html
            trend-graph.png
            test-history.csv
            test-flake-history.csv

      # ---------------------------------------------------------
      # 📧 Always Send Nightly Email Notification
      # ---------------------------------------------------------
      - name: Send nightly email notification
        if: always()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          to: ${{ secrets.EMAIL_RECIPIENTS }}
          from: "ci-bot <${{ secrets.SMTP_USERNAME }}>"
          subject: >
            Nightly Regression —
            ${{ steps.summary_data.outputs.failed != '0' && '❌ Failures Detected' || '✅ All Tests Passed' }}
          attachments: |
            ${{ steps.zipname.outputs.zip_name }}
          body: |
            The nightly regression run has completed.

            Total: ${{ steps.summary_data.outputs.total }}
            Passed: ${{ steps.summary_data.outputs.passed }}
            Failed: ${{ steps.summary_data.outputs.failed }}
            Duration: ${{ steps.summary_data.outputs.duration }} seconds
            Failure Rate: ${{ steps.summary_data.outputs.failure_rate }} %

            Flaky tests:
            ${{ steps.flaky.outputs.flaky_tests }}

            Trend graph, dashboard, and all artifacts are available in GitHub Actions.
