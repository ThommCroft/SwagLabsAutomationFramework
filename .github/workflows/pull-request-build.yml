name: PR Test Pipeline

# ---------------------------------------------------------
# 🧪 Trigger on Pull Requests + Push to Main
# ---------------------------------------------------------
on:
  pull_request:
    types: [opened, synchronize, reopened]

  push:
    branches:
      - main

jobs:
  pr-tests:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write
      actions: read

    steps:

      # ---------------------------------------------------------
      # 📥 Checkout Repository
      # ---------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # ---------------------------------------------------------
      # ⚙️ Setup .NET
      # ---------------------------------------------------------
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      # ---------------------------------------------------------
      # 📦 Restore Dependencies
      # ---------------------------------------------------------
      - name: Restore dependencies
        run: dotnet restore

      # ---------------------------------------------------------
      # 🏗️ Build Test Project
      # ---------------------------------------------------------
      - name: Build test project
        run: dotnet build AutomationFramework/AutomationFramework.csproj --configuration Debug --no-restore

      # ---------------------------------------------------------
      # 🌐 Install Playwright Dependencies
      # ---------------------------------------------------------
      - name: Install Playwright dependencies
        uses: powershell-devops/powershell-devops@v0.2.0

      # ---------------------------------------------------------
      # 🎭 Ensure Playwright Browsers Installed
      # ---------------------------------------------------------
      - name: Ensure browsers are installed
        run: pwsh ${{ github.workspace }}/AutomationFramework/bin/Debug/net8.0/playwright.ps1 install --with-deps

      # ---------------------------------------------------------
      # 🧪 Run Tests (Continue on Error)
      # ---------------------------------------------------------
      - name: Run Tests
        continue-on-error: true
        run: dotnet test AutomationFramework/AutomationFramework.csproj --no-build --verbosity normal --logger "trx;LogFileName=TestReport.trx"

      # ---------------------------------------------------------
      # 🔍 DEBUG: Locate TestResults folder and contents
      # ---------------------------------------------------------
      - name: Locate TestResults folder
        run: |
          echo "Searching for TestResults folders..."
          find . -type d -name "TestResults"

          echo ""
          echo "Listing contents of all TestResults folders..."
          find . -type d -name "TestResults" -exec sh -c 'echo "--- {} ---"; ls -R "{}"' \;

      # ---------------------------------------------------------
      # 📤 Upload TRX + ExtentReport + Screenshots + Traces
      # ---------------------------------------------------------
      - name: Upload test results
        uses: actions/upload-artifact@v4
        with:
          name: pr-test-results
          path: |
            AutomationFramework/TestResults/**
            AutomationFramework/bin/Debug/net8.0/TestResults/**

      # ---------------------------------------------------------
      # 📊 Parse TRX and Build Summary
      # ---------------------------------------------------------
      - name: Parse TRX and build summary
        id: summary_data
        run: |
          trx_file=$(find AutomationFramework/TestResults -name "*.trx" | head -n1)
          if [ -z "$trx_file" ]; then
            echo "No TRX file found"
            exit 1
          fi
          export TRX_FILE="$trx_file"
          python .github/scripts/parse_trx.py

      # ---------------------------------------------------------
      # 🧹 Detect Flaky Tests
      # ---------------------------------------------------------
      - name: Detect flaky tests
        id: flaky
        run: |
          pip install pandas
          python .github/scripts/detect_flaky_tests.py

      # ---------------------------------------------------------
      # 🖥️ Generate HTML Dashboard (artifact only)
      # ---------------------------------------------------------
      - name: Generate HTML dashboard
        env:
          TOTAL: ${{ steps.summary_data.outputs.total }}
          PASSED: ${{ steps.summary_data.outputs.passed }}
          FAILED: ${{ steps.summary_data.outputs.failed }}
          DURATION: ${{ steps.summary_data.outputs.duration }}
          FAILURE_RATE: ${{ steps.summary_data.outputs.failure_rate }}
          FAILED_TABLE: ${{ steps.summary_data.outputs.failed_table }}
          SLOW_TESTS: ${{ steps.summary_data.outputs.slow_tests }}
          NEW_VS_PREV: ${{ steps.summary_data.outputs.new_vs_prev }}
          FLAKY_TESTS: ${{ steps.flaky.outputs.flaky_tests }}
        run: python .github/scripts/generate_dashboard.py

      # ---------------------------------------------------------
      # 📝 Write Dashboard Summary to GitHub UI
      # ---------------------------------------------------------
      - name: Write summary to GitHub
        run: |
          {
            echo "## 🧪 Test Summary"
            echo ""
            echo "**Total:** ${{ steps.summary_data.outputs.total }}"
            echo "**Passed:** ${{ steps.summary_data.outputs.passed }}"
            echo "**Failed:** ${{ steps.summary_data.outputs.failed }}"
            echo "**Duration:** ${{ steps.summary_data.outputs.duration }} seconds"
            echo "**Failure Rate:** ${{ steps.summary_data.outputs.failure_rate }} %"
            echo ""
            echo "### ❌ Failed Tests"
            echo "${{ steps.summary_data.outputs.failed_table }}"
            echo ""
            echo "### 🐢 Slow Tests"
            echo "${{ steps.summary_data.outputs.slow_tests }}"
            echo ""
            echo "### 🔁 Flaky Tests"
            echo "${{ steps.flaky.outputs.flaky_tests }}"
            echo ""
            echo "### 📊 Dashboard File"
            echo "The full HTML dashboard is available in the workflow artifacts."
          } >> $GITHUB_STEP_SUMMARY

      # ---------------------------------------------------------
      # 📥 Download test artifacts for zipping
      # ---------------------------------------------------------
      - name: Download test artifacts
        uses: actions/download-artifact@v4
        with:
          name: pr-test-results
          path: artifacts

      # ---------------------------------------------------------
      # 🏷️ Determine ZIP name dynamically
      # ---------------------------------------------------------
      - name: Set ZIP name
        id: zipname
        run: |
          if [ "${{ github.event.pull_request.number }}" != "" ]; then
            echo "zip_name=PR-${{ github.event.pull_request.number }}-artifacts.zip" >> $GITHUB_OUTPUT
          else
            echo "zip_name=commit-${{ github.sha }}-artifacts.zip" >> $GITHUB_OUTPUT
          fi

      # ---------------------------------------------------------
      # 📦 Zip entire artifacts folder
      # ---------------------------------------------------------
      - name: Zip all test artifacts
        run: |
          zip -r "${{ steps.zipname.outputs.zip_name }}" artifacts

      # ---------------------------------------------------------
      # 📝 Post PR Comment (Improved UI + Dashboard Link)
      # ---------------------------------------------------------
      - name: Post PR comment
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          recreate: true
          message: |
            ## 🧪 Test Results Summary

            **Status:** ${{ steps.summary_data.outputs.failed != '0' && '❌ Some tests failed' || '✅ All tests passed' }}

            **Total:** ${{ steps.summary_data.outputs.total }}  
            **Passed:** 🟢 ${{ steps.summary_data.outputs.passed }}  
            **Failed:** 🔴 ${{ steps.summary_data.outputs.failed }}  
            **Duration:** ⏱️ ${{ steps.summary_data.outputs.duration }} seconds  
            **Failure Rate:** ${{ steps.summary_data.outputs.failure_rate }} %

            ---

            ### ❌ Failed Tests
            ${{ steps.summary_data.outputs.failed == '0' && '_No failed tests._' || steps.summary_data.outputs.failed_table }}

            ---

            ### 🐢 Slowest Tests
            <details>
              <summary>Show slow tests</summary>

            ${{ steps.summary_data.outputs.slow_tests }}

            </details>

            ---

            ### 🔁 Flaky Tests
            <details>
              <summary>Show flaky test analysis</summary>

            ${{ steps.flaky.outputs.flaky_tests }}

            </details>

            ---

            ### 📊 Dashboard
            The full HTML dashboard is available in the workflow artifacts.  
            👉 **[Open Dashboard](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})**

            ---

            ### 📦 Artifacts
            **ZIP File:** `${{ steps.zipname.outputs.zip_name }}`  
            **Download:** 👉 [View & Download Artifacts](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})

            Contains:
            - TRX test results  
            - ExtentReport HTML  
            - Screenshots  
            - Playwright traces  

            ---

      # ---------------------------------------------------------
      # 📧 Always Send Email Notification (clean version)
      # ---------------------------------------------------------
      - name: Send email notification
        if: always()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          to: ${{ secrets.EMAIL_RECIPIENTS }}
          from: "ci-bot <${{ secrets.SMTP_USERNAME }}>"
          subject: >
            PR #${{ github.event.pull_request.number }} —
            ${{ steps.summary_data.outputs.failed != '0' && '❌ Failures Detected' || '✅ All Tests Passed' }}
          html_body: |
            <h2>PR Test Pipeline Completed</h2>

            <p><strong>Total:</strong> ${{ steps.summary_data.outputs.total }}</p>
            <p><strong>Passed:</strong> ${{ steps.summary_data.outputs.passed }}</p>
            <p><strong>Failed:</strong> ${{ steps.summary_data.outputs.failed }}</p>
            <p><strong>Duration:</strong> ${{ steps.summary_data.outputs.duration }} seconds</p>
            <p><strong>Failure Rate:</strong> ${{ steps.summary_data.outputs.failure_rate }} %</p>

            <h3>Flaky Tests</h3>
            <pre>${{ steps.flaky.outputs.flaky_tests }}</pre>

            <h3>Attachments</h3>
            <p>The ZIP file contains:</p>
            <ul>
              <li>TestReport.trx</li>
              <li>ExtentReport.html</li>
              <li>Screenshots</li>
              <li>Traces</li>
            </ul>

          attachments: |
            ${{ steps.zipname.outputs.zip_name }}
